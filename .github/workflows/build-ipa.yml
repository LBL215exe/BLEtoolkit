name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    env:
      SCHEME: "BLEToolkit"
      PROJECT: "BLEToolkit.xcodeproj"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show available schemes (debug helper)
        run: |
          xcodebuild -list -project "$PROJECT" || true

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH=$(find build/App.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -n 1)
          echo "Found app: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r -y "unsigned.ipa" Payload
          cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: build/unsigned.ipa
